<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buy now, pay later – Jurybewertung</title>
<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --border:#e2e2e2;
  --text:#1a1a1a;
  --muted:#666;
  --accent:#c4422c;
  --ok:#1f6f4a;
  --ok-soft:#e6f3ec;
  --err:#a01616;
  --err-soft:#fbeaea;
  --info-soft:#eef2ff;
  --info-border:#3756b0;
  --font: Arial, Helvetica, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  color:var(--text);
  background:var(--bg);
  font-size:15px;
  line-height:1.5;
}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

.card{
  background:var(--card);
  border-radius:10px;
  padding:22px 24px;
  margin-bottom:16px;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
@media (max-width:640px){ .card{padding:18px 16px} .wrap{padding:18px 12px 40px} }

h1{font-size:24px;font-weight:700;margin:0 0 4px}
h2{font-size:16px;font-weight:600;color:var(--muted);margin:0 0 4px}
.author{font-size:14px;margin:8px 0 0;color:var(--text)}
.intro-note{font-size:13px;color:var(--muted);margin:14px 0 0;line-height:1.5}

/* Juror-Zeile */
.meta-row{
  display:grid;grid-template-columns:2fr 1fr;gap:14px;
  margin-top:18px;
}
@media (max-width:640px){.meta-row{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:13px;font-weight:600;color:var(--text)}
.field label .req{color:var(--accent)}
.field input{
  font:inherit;padding:9px 12px;
  border:1px solid var(--border);border-radius:6px;
  background:#fff;color:var(--text);
}
.field input:focus{outline:none;border-color:var(--accent)}
.field input.invalid{border-color:var(--err);background:#fff7f7}

/* Skala */
.legend{
  margin-top:14px;padding:10px 12px;background:#fafafa;
  border:1px solid var(--border);border-radius:6px;
  font-size:13px;color:var(--muted);
}
.legend b{color:var(--text)}

/* Nav-Buttons für Konzepte */
.nav{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0 0}
.nav button{
  padding:8px 14px;border:1px solid var(--border);background:#fff;color:var(--text);
  border-radius:6px;font:inherit;font-size:14px;cursor:pointer;
}
.nav button:hover{border-color:#999}
.nav button.active{background:var(--text);color:#fff;border-color:var(--text)}
.nav button.scored::after{content:" ✓";color:var(--ok);font-weight:700}
.nav button.active.scored::after{color:#fff}

.progress{margin-top:10px;font-size:13px;color:var(--muted)}

/* Konzept-Karte */
h3.concept-title{font-size:18px;font-weight:700;margin:0 0 14px}
.concept-name-input{
  width:100%;font:inherit;font-size:15px;padding:9px 12px;
  border:1px solid var(--border);border-radius:6px;margin-bottom:16px;
}
.concept-name-input:focus{outline:none;border-color:var(--accent)}

/* Kriterien-Tabelle */
table.crit{width:100%;border-collapse:collapse;margin-bottom:14px}
table.crit th,table.crit td{
  border:1px solid var(--border);padding:9px 12px;text-align:left;font-size:14px;
}
table.crit th{background:#fafafa;font-weight:600;font-size:13px}
table.crit td.num{text-align:center;width:120px}
table.crit td.weight{width:90px;color:var(--muted);text-align:center}
table.crit input[type=number]{
  width:70px;padding:6px 8px;font:inherit;font-size:14px;
  border:1px solid var(--border);border-radius:5px;text-align:center;
}
table.crit input[type=number]:focus{outline:none;border-color:var(--accent)}

.total-line{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:10px 12px;background:#fafafa;border:1px solid var(--border);
  border-radius:6px;margin-bottom:14px;
}
.total-line .lbl{font-size:14px;font-weight:600}
.total-line .val{font-size:20px;font-weight:700}
.total-line .val .max{font-size:13px;color:var(--muted);font-weight:500;margin-left:4px}

textarea.note{
  width:100%;font:inherit;font-size:14px;padding:10px 12px;
  border:1px solid var(--border);border-radius:6px;
  resize:vertical;min-height:70px;
}
textarea.note:focus{outline:none;border-color:var(--accent)}

/* Ranking */
table.rank{width:100%;border-collapse:collapse}
table.rank th,table.rank td{
  border:1px solid var(--border);padding:9px 12px;text-align:left;font-size:14px;
  vertical-align:top;
}
table.rank th{background:#fafafa;font-weight:600;font-size:13px}
table.rank td.rang{width:60px;text-align:center;font-weight:700}
table.rank td.score{width:110px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
table.rank tr.r1 td.rang{background:var(--accent);color:#fff}

/* Buttons */
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
button.btn{
  padding:10px 18px;border:1px solid var(--border);background:#fff;color:var(--text);
  border-radius:6px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;
}
button.btn:hover{border-color:#999}
button.btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
button.btn.primary:hover{background:#000}
button.btn:disabled{opacity:.5;cursor:not-allowed}

/* Status-Meldung */
#msg{margin-top:14px;padding:12px 16px;border-radius:6px;font-weight:500;font-size:14px}
#msg.ok{background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok)}
#msg.err{background:var(--err-soft);color:var(--err);border:1px solid var(--err)}
#msg.info{background:var(--info-soft);color:var(--info-border);border:1px solid var(--info-border)}

.hidden{display:none !important}

@media print{
  body{background:#fff}
  .wrap{padding:0}
  .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;margin-bottom:12px}
  .nav,.actions,#msg{display:none !important}
  .form.hidden{display:block !important}
}

.section-title{margin:0 0 12px;font-size:15px;font-weight:700}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
  <h1>Wettbewerbsprojekt „Buy now, pay later"</h1>
  <h2>Studiengang Zeitbasierte Medien</h2>
  <p class="author"><strong>Prof. Julia Kühne</strong></p>
  <p class="intro-note">Bewertung von 6 Konzepten (0–5 Punkte je Kriterium). Eingaben werden automatisch zwischengespeichert.</p>

  <div class="meta-row">
    <div class="field">
      <label>Name des Jurymitglieds <span class="req">*</span></label>
      <input type="text" id="juror" required oninput="autosave();this.classList.remove('invalid')">
    </div>
    <div class="field">
      <label>Datum</label>
      <input type="date" id="datum" oninput="autosave()">
    </div>
  </div>

  <div class="nav" id="nav"></div>
  <div class="progress" id="progress"></div>
</div>

<div id="forms"></div>

<div class="card">
  <p class="section-title">Ranking</p>
  <table class="rank">
    <thead>
      <tr><th>Rang</th><th>Konzept</th><th>Gesamtpunkte</th><th>Anmerkungen</th></tr>
    </thead>
    <tbody id="ranking"></tbody>
  </table>
</div>

<div class="card">
  <div class="actions">
    <button class="btn" onclick="clearAll()">Alle Eingaben löschen</button>
    <button class="btn primary" onclick="submitToSheet()">Bewertung absenden</button>
  </div>
  <div id="msg" class="hidden"></div>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJL_8UM6umz9WkFDDaOfF9L8LNL0hQoaULtg-2N3Vad5gPR5WKNozooZM6A97BcUo/exec";
const STORAGE_KEY = "jury_buynotpaylater_v1";

const weights = {kreativ:30, ziel:30, machbar:20, medien:15, wirtschaft:5};
const criteriaOrder = ["kreativ","ziel","machbar","medien","wirtschaft"];
const criteriaLabels = {
  kreativ: "Kreativität & Innovationsgrad",
  ziel: "Zielgruppenwirkung",
  machbar: "Machbarkeit",
  medien: "Medienadäquate Umsetzung",
  wirtschaft: "Wirtschaftlichkeit"
};

function score(i){
  let total = 0;
  for(const [k,w] of Object.entries(weights)){
    const v = parseFloat(document.getElementById(k+i).value) || 0;
    total += v * (w/100);
  }
  document.getElementById('total'+i).innerText = total.toFixed(2);
  return total;
}

function isScored(i){
  for(const k of criteriaOrder){
    const v = document.getElementById(k+i).value;
    if(v !== "" && v != null) return true;
  }
  return false;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function ranking(){
  const arr = [];
  for(let i=1; i<=6; i++){
    arr.push({
      n: document.getElementById('name'+i).value || ('Konzept '+i),
      s: score(i),
      a: document.getElementById('note'+i).value || '',
      scored: isScored(i)
    });
  }
  arr.sort((a,b) => b.s - a.s);
  document.getElementById('ranking').innerHTML = arr.map((r,idx) => {
    const rank = idx+1;
    return `<tr class="r${rank}">
      <td class="rang">${rank}</td>
      <td>${escapeHtml(r.n)}</td>
      <td class="score">${r.s.toFixed(2)} <span style="color:var(--muted);font-weight:500"> / 5.00</span></td>
      <td>${escapeHtml(r.a)}</td>
    </tr>`;
  }).join('');

  let done = 0;
  for(let i=1; i<=6; i++){
    const scored = isScored(i);
    const tab = document.querySelector(`.nav button[data-i="${i}"]`);
    if(tab) tab.classList.toggle('scored', scored);
    if(scored) done++;
  }
  document.getElementById('progress').innerHTML =
    `<strong>${done} von 6</strong> Konzepten bewertet`;

  autosave();
}

// === UI aufbauen ===
const forms = document.getElementById('forms');
const nav = document.getElementById('nav');

for(let i=1; i<=6; i++){
  nav.insertAdjacentHTML('beforeend',
    `<button type="button" class="${i===1?'active':''}" data-i="${i}" onclick="show(${i})">Konzept ${i}</button>`);

  const rows = criteriaOrder.map(k => `
    <tr>
      <td>${criteriaLabels[k]}</td>
      <td class="weight">${weights[k]} %</td>
      <td class="num">
        <input type="number" min="0" max="5" step="1" id="${k}${i}" oninput="ranking()">
      </td>
    </tr>`).join('');

  forms.insertAdjacentHTML('beforeend', `
    <div class="card form${i>1?' hidden':''}" id="c${i}">
      <h3 class="concept-title">Konzept ${i}</h3>
      <input class="concept-name-input" id="name${i}" placeholder="Name des Konzepts" oninput="ranking()">
      <table class="crit">
        <thead>
          <tr><th>Kriterium</th><th style="width:90px;text-align:center">Gewichtung</th><th style="width:120px;text-align:center">Punkte (0–5)</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="total-line">
        <span class="lbl">Gesamtpunktzahl (gewichtet)</span>
        <span class="val"><span id="total${i}">0.00</span><span class="max">/ 5.00</span></span>
      </div>
      <textarea class="note" id="note${i}" placeholder="Besondere Stärken, Anmerkungen …" oninput="ranking()"></textarea>
    </div>`);
}

function show(i){
  document.querySelectorAll('.form').forEach(x => x.classList.add('hidden'));
  document.getElementById('c'+i).classList.remove('hidden');
  document.querySelectorAll('.nav button').forEach(t =>
    t.classList.toggle('active', Number(t.dataset.i) === i));
  window.scrollTo({top:0, behavior:'smooth'});
}

// === Daten sammeln ===
function collectData(){
  const konzepte = [];
  for(let i=1; i<=6; i++){
    const punkte = {};
    for(const k of criteriaOrder){
      punkte[k] = parseFloat(document.getElementById(k+i).value) || 0;
    }
    konzepte.push({
      nr: i,
      name: document.getElementById('name'+i).value || ('Konzept '+i),
      punkte,
      gesamt: parseFloat(score(i).toFixed(2)),
      anmerkungen: document.getElementById('note'+i).value || ''
    });
  }
  return {
    jurymitglied: document.getElementById('juror').value.trim(),
    datum: document.getElementById('datum').value || new Date().toISOString().slice(0,10),
    clientZeit: new Date().toISOString(),
    konzepte
  };
}

// === Auto-Save ===
function autosave(){
  try{
    const snap = {
      juror: document.getElementById('juror').value,
      datum: document.getElementById('datum').value,
      konzepte: []
    };
    for(let i=1; i<=6; i++){
      const o = {
        name: document.getElementById('name'+i).value,
        note: document.getElementById('note'+i).value
      };
      for(const k of criteriaOrder) o[k] = document.getElementById(k+i).value;
      snap.konzepte.push(o);
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snap));
  }catch(e){}
}

function restore(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    if(s.juror) document.getElementById('juror').value = s.juror;
    if(s.datum) document.getElementById('datum').value = s.datum;
    (s.konzepte || []).forEach((o,idx) => {
      const i = idx+1;
      if(o.name != null) document.getElementById('name'+i).value = o.name;
      if(o.note != null) document.getElementById('note'+i).value = o.note;
      for(const k of criteriaOrder){
        if(o[k] != null) document.getElementById(k+i).value = o[k];
      }
    });
  }catch(e){}
}

function clearAll(){
  if(!confirm("Wirklich alle Eingaben dieser Bewertung löschen?")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// === Absenden ===
async function submitToSheet(){
  const juror = document.getElementById('juror');
  if(!juror.value.trim()){
    juror.classList.add('invalid');
    juror.focus();
    juror.scrollIntoView({behavior:'smooth', block:'center'});
    showMsg("Bitte den Namen des Jurymitglieds eingeben.", "err");
    return;
  }

  const data = collectData();
  const buttons = document.querySelectorAll('button');
  buttons.forEach(b => b.disabled = true);
  showMsg("Sende Bewertung …", "info");

  try{
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify(data),
      redirect: "follow"
    });
    const text = await res.text();
    let parsed;
    try{ parsed = JSON.parse(text); }
    catch(e){ parsed = {ok:false, error:"Unerwartete Antwort: " + text.slice(0,200)}; }

    if(parsed.ok){
      showMsg("✓ Bewertung erfolgreich gespeichert. Vielen Dank!", "ok");
    } else {
      showMsg("Fehler: " + (parsed.error || "unbekannt"), "err");
    }
  } catch(err){
    showMsg("Netzwerkfehler: " + err.message, "err");
  } finally {
    buttons.forEach(b => b.disabled = false);
  }
}

function showMsg(text, type){
  const m = document.getElementById('msg');
  m.classList.remove('hidden','ok','err','info');
  m.classList.add(type);
  m.textContent = text;
  m.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// === Init ===
restore();
if(!document.getElementById('datum').value){
  document.getElementById('datum').value = new Date().toISOString().slice(0,10);
}
ranking();
</script>
</body>
</html>

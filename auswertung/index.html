<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auswertung – Buy now, pay later</title>
<style>
:root{
  --bg:#f5f5f5;
  --card:#ffffff;
  --border:#e2e2e2;
  --text:#1a1a1a;
  --muted:#666;
  --accent:#c4422c;
  --ok:#1f6f4a;
  --err:#a01616;
  --err-soft:#fbeaea;
  --font: Arial, Helvetica, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--text);background:var(--bg);font-size:15px;line-height:1.5}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
.card{background:var(--card);border-radius:10px;padding:22px 24px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
@media (max-width:640px){ .card{padding:18px 16px} .wrap{padding:18px 12px 40px} }

h1{font-size:24px;font-weight:700;margin:0 0 4px}
h2{font-size:16px;font-weight:600;color:var(--muted);margin:0 0 0}
.hint{font-size:13px;color:var(--muted);margin:8px 0 0}

.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.btn{padding:9px 16px;border:1px solid var(--border);background:#fff;color:var(--text);border-radius:6px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:#999}
.btn.primary{background:var(--text);color:#fff;border-color:var(--text)}

.section-title{margin:0 0 12px;font-size:15px;font-weight:700}

/* Übersicht */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat{padding:14px 16px;background:#fafafa;border:1px solid var(--border);border-radius:6px}
.stat-val{font-size:24px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.stat-label{font-size:13px;color:var(--muted);margin-top:4px}

/* Tabellen (Ranking + Details) */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid var(--border);padding:9px 12px;text-align:left;vertical-align:top}
th{background:#fafafa;font-weight:600;font-size:13px;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--accent)}
th .arrow{margin-left:4px;opacity:.7}
td.num{text-align:right;font-variant-numeric:tabular-nums}
td.center{text-align:center}
td.strong{font-weight:700}
td.rang{width:60px;text-align:center;font-weight:700}
tr.r1 td.rang{background:var(--accent);color:#fff}
tr.empty td{color:var(--muted)}
.muted{color:var(--muted)}

/* Pro-Kriterium-Aufklapp */
.details{margin-top:6px}
.details summary{cursor:pointer;font-size:13px;color:var(--muted);font-weight:600;list-style:none;padding:4px 0}
.details summary::-webkit-details-marker{display:none}
.details summary::before{content:'▸';display:inline-block;margin-right:6px;transition:transform .15s;font-size:10px}
.details[open] summary::before{transform:rotate(90deg)}
.crit-list{margin-top:6px;padding:10px 12px;background:#fafafa;border:1px solid var(--border);border-radius:6px}
.crit-row{display:grid;grid-template-columns:1fr 60px;gap:10px;padding:3px 0;font-size:13px}
.crit-row .lbl .muted{margin-left:4px;font-size:12px}
.crit-row .val{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}

/* Filter-Chips */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;border:1px solid var(--border);background:#fff;color:var(--text);border-radius:99px;font:inherit;font-size:13px;cursor:pointer}
.chip:hover{border-color:#999}
.chip.active{background:var(--text);color:#fff;border-color:var(--text)}

.table-wrap{overflow-x:auto}
.table-wrap table{min-width:760px}

#err{margin-top:12px;padding:12px 16px;border-radius:6px;background:var(--err-soft);color:var(--err);font-weight:500;display:none}
.skeleton{height:36px;background:linear-gradient(90deg,#eee 0%,#e0e0e0 50%,#eee 100%);background-size:200% 100%;animation:shine 1.2s infinite;border-radius:6px;margin:6px 0}
@keyframes shine{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
  <h1>Auswertung „Buy now, pay later"</h1>
  <h2>Live-Ranking aus den Jury-Bewertungen</h2>
  <p class="hint" id="meta">lädt …</p>
  <div class="actions">
    <button class="btn primary" onclick="loadData()">↻ Aktualisieren</button>
    <a class="btn" href="../">← Zur Bewertung</a>
  </div>
  <div id="err"></div>
</div>

<div class="card">
  <p class="section-title">Übersicht</p>
  <div id="stats">
    <div class="skeleton"></div>
  </div>
</div>

<div class="card">
  <p class="section-title">Ranking</p>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:60px;text-align:center">Rang</th>
          <th>Konzept</th>
          <th style="width:130px;text-align:center">Bewertungen</th>
          <th style="width:130px;text-align:right">Ø Gesamt</th>
        </tr>
      </thead>
      <tbody id="ranking">
        <tr><td colspan="4"><div class="skeleton"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="card">
  <p class="section-title">Detail-Tabelle aller Bewertungen</p>
  <div id="filters" style="margin-bottom:12px"></div>
  <div class="table-wrap">
    <table id="tbl">
      <thead></thead><tbody></tbody>
    </table>
  </div>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJL_8UM6umz9WkFDDaOfF9L8LNL0hQoaULtg-2N3Vad5gPR5WKNozooZM6A97BcUo/exec";
const DATA_URL = SCRIPT_URL + "?action=data";

const state = {
  data: null,
  filter: { juror: "all" },
  sort: { col: "timestamp", dir: "desc" }
};

function esc(s){
  return String(s == null ? "" : s)
    .replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadData(){
  document.getElementById('err').style.display = 'none';
  document.getElementById('meta').textContent = 'Lade Daten …';
  try{
    const res = await fetch(DATA_URL, {redirect:"follow"});
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    state.data = data;
    render();
  }catch(err){
    const e = document.getElementById('err');
    e.textContent = "Fehler beim Laden: " + err.message;
    e.style.display = 'block';
    document.getElementById('meta').textContent = '—';
  }
}

function render(){
  const d = state.data;
  if(!d) return;
  const ts = d.generated ? new Date(d.generated) : new Date();
  document.getElementById('meta').textContent =
    "Aktualisiert: " + ts.toLocaleString('de-DE', {dateStyle:'medium', timeStyle:'short'});
  renderStats(d);
  renderRanking(d);
  renderFilters(d);
  renderTable(d);
}

function renderStats(d){
  const totalEntries = d.entries.length;
  const jurors = d.jurymitglieder.length;
  const scoredConcepts = d.summary.filter(s => s.count > 0).length;
  const completeJurors = countCompleteJurors(d);
  document.getElementById('stats').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-val">${jurors}</div><div class="stat-label">Jurymitglieder</div></div>
      <div class="stat"><div class="stat-val">${completeJurors}</div><div class="stat-label">Komplett bewertet</div></div>
      <div class="stat"><div class="stat-val">${scoredConcepts}/6</div><div class="stat-label">Konzepte mit Bewertung</div></div>
      <div class="stat"><div class="stat-val">${totalEntries}</div><div class="stat-label">Bewertungen total</div></div>
    </div>`;
}

function countCompleteJurors(d){
  const byJuror = {};
  for(const e of d.entries){
    const set = byJuror[e.jurymitglied] = byJuror[e.jurymitglied] || new Set();
    set.add(e.konzept_nr);
  }
  return Object.values(byJuror).filter(s => s.size >= 6).length;
}

function renderRanking(d){
  const rows = [...d.summary].sort((a,b) => {
    if(a.count === 0 && b.count === 0) return a.nr - b.nr;
    if(a.count === 0) return 1;
    if(b.count === 0) return -1;
    return b.avgTotal - a.avgTotal;
  });

  document.getElementById('ranking').innerHTML = rows.map(s => {
    const rank = s.rank || '—';
    const rankClass = s.rank === 1 ? 'r1' : '';
    const emptyClass = s.count === 0 ? 'empty' : '';

    const critRows = d.criteria.map(c => {
      const v = s.avgs[c.key];
      return `<div class="crit-row">
        <div class="lbl">${esc(c.label)}<span class="muted">${c.weight}%</span></div>
        <div class="val">${v != null ? v.toFixed(2) : '–'}</div>
      </div>`;
    }).join('');

    return `<tr class="${rankClass} ${emptyClass}">
      <td class="rang">${rank}</td>
      <td>
        <strong>${esc(s.name)}</strong>
        <div class="muted" style="font-size:13px;margin-top:2px">Konzept ${s.nr}</div>
        ${s.count > 0 ? `
          <details class="details">
            <summary>Pro Kriterium ansehen</summary>
            <div class="crit-list">${critRows}</div>
          </details>` : ''}
      </td>
      <td class="center">${s.count}</td>
      <td class="num strong">${s.avgTotal != null ? s.avgTotal.toFixed(2) : '–'} <span class="muted" style="font-weight:500">/ 5.00</span></td>
    </tr>`;
  }).join('');
}

function renderFilters(d){
  const opts = ['all', ...d.jurymitglieder];
  const chips = opts.map(j => {
    const active = state.filter.juror === j ? 'active' : '';
    const label = j === 'all' ? `Alle (${d.entries.length})` : `${j} (${d.entries.filter(e => e.jurymitglied === j).length})`;
    return `<button class="chip ${active}" onclick="setFilter(${JSON.stringify(j)})">${esc(label)}</button>`;
  }).join('');
  document.getElementById('filters').innerHTML = `<div class="chips">${chips}</div>`;
}

function setFilter(j){
  state.filter.juror = j;
  render();
}

function renderTable(d){
  const cols = [
    {key:"timestamp",    label:"Zeit"},
    {key:"jurymitglied", label:"Juror:in"},
    {key:"konzept_nr",   label:"Konzept"},
    ...d.criteria.map(c => ({key:c.key, label:c.label.split(' ')[0], crit:true, full:c.label})),
    {key:"gesamt",       label:"Gesamt"},
    {key:"anmerkungen",  label:"Anmerkungen"}
  ];

  let entries = state.filter.juror === "all"
    ? d.entries
    : d.entries.filter(e => e.jurymitglied === state.filter.juror);

  entries = [...entries].sort((a,b) => {
    const col = state.sort.col;
    let va, vb;
    if(d.criteria.find(c => c.key === col)){ va = a.punkte[col]; vb = b.punkte[col]; }
    else if(col === "konzept_nr"){ va = a.konzept_nr; vb = b.konzept_nr; }
    else if(col === "gesamt"){ va = a.gesamt; vb = b.gesamt; }
    else { va = a[col]; vb = b[col]; }
    if(typeof va === "string") va = va.toLowerCase();
    if(typeof vb === "string") vb = vb.toLowerCase();
    if(va < vb) return state.sort.dir === "asc" ? -1 : 1;
    if(va > vb) return state.sort.dir === "asc" ? 1 : -1;
    return 0;
  });

  const tbl = document.getElementById('tbl');
  tbl.querySelector('thead').innerHTML = `<tr>${cols.map(c => {
    const arrow = state.sort.col === c.key ? `<span class="arrow">${state.sort.dir === "asc" ? '▲' : '▼'}</span>` : '';
    const title = c.full ? ` title="${esc(c.full)}"` : '';
    return `<th onclick="setSort(${JSON.stringify(c.key)})"${title}>${esc(c.label)}${arrow}</th>`;
  }).join('')}</tr>`;

  tbl.querySelector('tbody').innerHTML = entries.map(e => {
    const t = e.timestamp ? new Date(e.timestamp).toLocaleString('de-DE', {dateStyle:'short', timeStyle:'short'}) : '';
    return `<tr>
      <td>${esc(t)}</td>
      <td>${esc(e.jurymitglied)}</td>
      <td>${esc(e.konzept_name)} <span class="muted">(${e.konzept_nr})</span></td>
      ${d.criteria.map(c => `<td class="num">${e.punkte[c.key]}</td>`).join('')}
      <td class="num strong">${(e.gesamt || 0).toFixed(2)}</td>
      <td>${esc(e.anmerkungen)}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--muted);padding:24px">Keine Einträge</td></tr>`;
}

function setSort(col){
  if(state.sort.col === col){
    state.sort.dir = state.sort.dir === "asc" ? "desc" : "asc";
  } else {
    state.sort.col = col;
    state.sort.dir = (col === "gesamt" || col === "timestamp" || col === "konzept_nr") ? "desc" : "asc";
  }
  render();
}

loadData();
</script>
</body>
</html>
